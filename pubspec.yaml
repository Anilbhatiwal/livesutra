name: livesutra
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0

  firebase_storage: ^12.4.10
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/LiveSutra_logo.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/LiveSutra_logo.png
  android: true
  ios: true